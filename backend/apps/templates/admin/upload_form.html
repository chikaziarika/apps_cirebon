<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="card p-4 shadow-sm">
        <h5>Upload Data Konjar 2025</h5>
        <p class="text-muted small">Sistem akan otomatis memfilter D.I. Ciwado, Agung, Ketos, dan Cimanis</p>
        <input type="file" name="file_konjar" class="form-control mb-3" accept=".csv">
        <button type="submit" class="btn btn-primary">Mulai Import Data</button>
    </div>
</form>
